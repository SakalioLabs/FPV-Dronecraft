name: CI Verification

on:
  push:
    branches:
      - master
      - NeoForge
      - "playable/**"
      - "sim/**"
      - "integration/**"
      - "refactor/**"
      - "codex/**"
  pull_request:
    branches:
      - master
      - NeoForge

permissions:
  contents: read

env:
  FPVDRONE_UPDATE_GOLDEN_TRACES: "false"

jobs:
  verification-matrix:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: drone-sim-core tests
            command: ./gradlew --no-daemon :drone-sim-core:test
          - name: Fabric compatibility tests
            command: ./gradlew --no-daemon :fabric-mod:test
          - name: NeoForge mod build
            command: ./gradlew --no-daemon :neoforge-mod:build
          - name: full multi-loader build
            command: ./gradlew --no-daemon build
          - name: simulation golden and route equivalence
            command: ./gradlew --no-daemon :drone-sim-core:test --tests com.tenicana.dronecraft.sim.SimulationFlightGoldenTraceTest
          - name: NeoForge playable golden and route equivalence
            command: ./gradlew --no-daemon :neoforge-mod:test --tests com.tenicana.dronecraft.entity.PlayableFlightGoldenTraceTest
          - name: core dependency boundary and NeoForge entity routing
            command: |
              ./gradlew --no-daemon :drone-sim-core:test --tests com.tenicana.dronecraft.sim.flight.FlightCoreDependencyBoundaryTest
              ./gradlew --no-daemon :neoforge-mod:test --tests com.tenicana.dronecraft.entity.DroneEntityFlightModelRoutingTest
          - name: core and NeoForge serialization round-trip
            command: |
              ./gradlew --no-daemon :drone-sim-core:test --tests com.tenicana.dronecraft.sim.flight.FlightSerializationCodecTest --tests com.tenicana.dronecraft.sim.flight.FlightStateSnapshotTest
              ./gradlew --no-daemon :neoforge-mod:test --tests com.tenicana.dronecraft.entity.RotorLayoutCodecTest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Refuse golden trace regeneration
        run: |
          if [ "${FPVDRONE_UPDATE_GOLDEN_TRACES}" = "true" ]; then
            echo "CI must not run with FPVDRONE_UPDATE_GOLDEN_TRACES=true"
            exit 1
          fi

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  neoforge-gametest:
    name: NeoForge / GameTest integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Refuse golden trace regeneration
        run: |
          if [ "${FPVDRONE_UPDATE_GOLDEN_TRACES}" = "true" ]; then
            echo "CI must not run with FPVDRONE_UPDATE_GOLDEN_TRACES=true"
            exit 1
          fi

      - name: Run NeoForge GameTests
        run: ./gradlew --no-daemon --no-parallel --max-workers=1 :neoforge-mod:runGameTestServer

      - name: Upload NeoForge GameTest report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-gametest-report
          path: |
            neoforge-mod/build/reports/gametest/results.xml
            neoforge-mod/run/logs/latest.log
            neoforge-mod/run/crash-reports/**
          if-no-files-found: warn
          retention-days: 7

  neoforge-packaging:
    name: NeoForge / verified distribution jars
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Refuse golden trace regeneration
        run: |
          if [ "${FPVDRONE_UPDATE_GOLDEN_TRACES}" = "true" ]; then
            echo "CI must not run with FPVDRONE_UPDATE_GOLDEN_TRACES=true"
            exit 1
          fi

      - name: Verify NeoForge packaging
        run: ./gradlew --no-daemon :neoforge-mod:verifyNeoForgePackaging

      - name: Upload verified NeoForge jars
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-verified-distributions
          path: |
            neoforge-mod/build/libs/fpv-dronecraft-neoforge-*.jar
            !neoforge-mod/build/libs/*-sources.jar
            neoforge-mod/build/fpvdrone-distributions/*.jar
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  neoforge-server-self-test-matrix:
    name: NeoForge / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: simulation angle self-test
            slug: simulation-angle
            task: :neoforge-mod:runServerSelfTest
          - name: playable angle server self-test
            slug: playable-angle
            task: :neoforge-mod:runPlayableServerSelfTest
          - name: playable horizon server self-test
            slug: playable-horizon
            task: :neoforge-mod:runPlayableHorizonServerSelfTest
          - name: playable acro server self-test
            slug: playable-acro
            task: :neoforge-mod:runPlayableAcroServerSelfTest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Gradle wrapper and NeoForge EULA
        run: |
          chmod +x ./gradlew
          mkdir -p neoforge-mod/run
          printf "eula=true\n" > neoforge-mod/run/eula.txt

      - name: Refuse golden trace regeneration
        run: |
          if [ "${FPVDRONE_UPDATE_GOLDEN_TRACES}" = "true" ]; then
            echo "CI must not run with FPVDRONE_UPDATE_GOLDEN_TRACES=true"
            exit 1
          fi

      - name: Run ${{ matrix.name }}
        run: ./gradlew --no-daemon --no-parallel --max-workers=1 ${{ matrix.task }} -PfpvdroneSelfTestSeconds=12

      - name: Upload NeoForge self-test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-selftest-${{ matrix.slug }}
          path: |
            neoforge-mod/run/fpvdrone-selftest
            neoforge-mod/run/logs/latest.log
          if-no-files-found: warn
          retention-days: 7
