tasks.register("offlineFlight", JavaExec) {
	group = "simulation"
	description = "Runs a deterministic FPV drone physics scenario and writes a CSV flight log."
	classpath = sourceSets.main.runtimeClasspath
	mainClass.set("com.tenicana.dronecraft.sim.tools.OfflineFlightRecorder")
	doFirst {
		def presetName = project.findProperty("preset") ?: "racing_quad"
		def outputFile = project.findProperty("output") ?: layout.buildDirectory.file("offline-flight/${presetName}.csv").get().asFile.absolutePath
		args(presetName, outputFile)
	}
}

