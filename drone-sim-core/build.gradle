tasks.register("ctCpJLocalVoxelFlowSolver", JavaExec) {
	group = "simulation"
	description = "Exports CT/CP/J local voxel flow solver time-step summaries as CSV."
	classpath = sourceSets.main.runtimeClasspath
	mainClass.set("com.tenicana.dronecraft.sim.tools.CtCpJLocalVoxelFlowSolverExporter")
	doFirst {
		def presetName = project.findProperty("preset") ?: "apDrone"
		def outputFile = project.findProperty("output") ?: layout.buildDirectory.file("ct-cp-j-local-voxel-flow/${presetName}-solver-summary.csv").get().asFile.absolutePath
		def airDensity = project.findProperty("density") ?: ""
		def sourceThickness = project.findProperty("sourceThickness") ?: ""
		def cellSize = project.findProperty("cellSize") ?: ""
		def paddingCells = project.findProperty("paddingCells") ?: ""
		def subcellSamples = project.findProperty("subcellSamples") ?: ""
		def timeStep = project.findProperty("timeStep") ?: ""
		def kinematicViscosity = project.findProperty("kinematicViscosity") ?: ""
		def steps = project.findProperty("steps") ?: ""
		def ambientTemperature = project.findProperty("temperature") ?: ""
		def ambientHumidity = project.findProperty("humidity") ?: ""
		def maxAdvectionCourant = project.findProperty("maxAdvectionCourant") ?: ""
		def pressureProjectionIterations = project.findProperty("pressureProjectionIterations") ?: ""
		def downstreamWakeLength = project.findProperty("downstreamWakeLength") ?: ""
		def solidBoxBounds = [
			project.findProperty("solidBoxMinX"),
			project.findProperty("solidBoxMinY"),
			project.findProperty("solidBoxMinZ"),
			project.findProperty("solidBoxMaxX"),
			project.findProperty("solidBoxMaxY"),
			project.findProperty("solidBoxMaxZ")
		]
		def solidBoxes = project.findProperty("solidBoxes") ?: ""
		def solidBoxBoundCount = solidBoxBounds.count { it != null && !it.toString().isBlank() }
		args(presetName, outputFile, airDensity, sourceThickness, cellSize, paddingCells, subcellSamples, timeStep, kinematicViscosity, steps, ambientTemperature, ambientHumidity, maxAdvectionCourant, pressureProjectionIterations, downstreamWakeLength)
		if (!solidBoxes.toString().isBlank()) {
			if (solidBoxBoundCount > 0) {
				throw new GradleException("ctCpJLocalVoxelFlowSolver accepts either -PsolidBoxes or the legacy six solidBoxMin/Max properties, not both")
			}
			def solidBoxMinimumVolumeFraction = project.findProperty("solidBoxMinimumVolumeFraction") ?: ""
			args(solidBoxes.toString(), solidBoxMinimumVolumeFraction.toString())
		} else if (solidBoxBoundCount > 0) {
			if (solidBoxBoundCount != solidBoxBounds.size()) {
				throw new GradleException("ctCpJLocalVoxelFlowSolver solid box export requires all six -PsolidBoxMinX/Y/Z and -PsolidBoxMaxX/Y/Z properties")
			}
			def solidBoxMinimumVolumeFraction = project.findProperty("solidBoxMinimumVolumeFraction") ?: ""
			args(*(solidBoxBounds.collect { it.toString() } + [solidBoxMinimumVolumeFraction.toString()]))
		}
	}
}

